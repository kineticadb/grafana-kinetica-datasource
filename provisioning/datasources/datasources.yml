apiVersion: 1

datasources:
  - name: datasource
    uid: kinetica-datasource-test
    type: kinetica-datasource   # Must match the "id" in your plugin.json
    access: proxy
    orgId: 1
    url: http://localhost:9191
    isDefault: true
    version: 1
    editable: true

    jsonData:
      path: /resources
      username: test-user
      tlsSkipVerify: true

    secureJsonData:
      password: test-password